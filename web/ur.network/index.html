<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URnetwork</title>
    <style>
        /* Reset margins to ensure the full viewport height is used */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        /* Set the background color and use Flexbox to center content */
        body {
            background-color: #F8F8F8;
            display: flex;
            justify-content: center; /* Centers horizontally */
            align-items: center;     /* Centers vertically */
        }

        /* Ensure the logo is responsive and doesn't overflow small screens */
        .logo {
            max-width: 90%;
            height: auto;
        }
    </style>
</head>
<body>

    <img src="URnetwork-logo-dark.svg" alt="URnetwork Logo" class="logo">

</body>
</html>
